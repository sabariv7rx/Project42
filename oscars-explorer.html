<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crestwood University — Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Login ── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h1 { font-size: 22px; color: #1a3060; margin-bottom: 4px; }
    .card p  { font-size: 13px; color: #888; margin-bottom: 28px; }

    .card input, .card select {
      width: 100%;
      padding: 11px 14px;
      margin-bottom: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .card input:focus, .card select:focus { border-color: #1a3060; }

    .card button {
      width: 100%;
      padding: 12px;
      background: #1a3060;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 4px;
    }
    .card button:hover { background: #243f80; }

    .demo-btn {
      background: white !important;
      color: #1a3060 !important;
      border: 1px solid #1a3060 !important;
      margin-top: 10px !important;
    }

    /* ── Dashboard ── */
    #dashboard {
      display: none;
      width: 100%;
      padding: 32px;
    }

    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .dash-header h1 { font-size: 22px; color: #1a3060; }
    .dash-header button {
      padding: 8px 18px;
      background: #1a3060;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .kpis {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi {
      background: white;
      border-radius: 10px;
      padding: 20px 24px;
      flex: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .kpi .num { font-size: 26px; font-weight: 700; color: #1a3060; }
    .kpi .lbl { font-size: 12px; color: #888; margin-top: 4px; }

    .table-box {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .table-box input {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      outline: none;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      background: #f7f8fa;
      text-align: left;
      padding: 11px 16px;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td { padding: 12px 16px; font-size: 14px; border-top: 1px solid #f0f0f0; }
    tr:hover td { background: #fafbff; }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .active    { background: #e6f9ee; color: #1a7a3c; }
    .probation { background: #fff8e0; color: #9a6500; }
    .inactive  { background: #fdecea; color: #b52a1d; }
  </style>
</head>
<body>

<!-- Login -->
<div class="card" id="loginCard">
  <h1>🎓 Crestwood University</h1>
  <p>Sign in to the Student Portal</p>

  <select id="role">
    <option value="">Select role…</option>
    <option>Student</option>
    <option>Faculty</option>
    <option>Administrator</option>
  </select>
  <input type="email" id="email" placeholder="University email"/>
  <input type="password" id="pass" placeholder="Password"/>

  <button onclick="login()">Sign In</button>
  <button class="demo-btn" onclick="demo()">Demo — Enter as Admin</button>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="dash-header">
    <h1>🎓 Student Portal — <span id="userName"></span></h1>
    <button onclick="logout()">Log Out</button>
  </div>

  <div class="kpis">
    <div class="kpi"><div class="num">12,418</div><div class="lbl">Enrolled Students</div></div>
    <div class="kpi"><div class="num">3.47</div><div class="lbl">Average GPA</div></div>
    <div class="kpi"><div class="num">94.2%</div><div class="lbl">Attendance Rate</div></div>
    <div class="kpi"><div class="num">87</div><div class="lbl">On Probation</div></div>
  </div>

  <div class="table-box">
    <input type="text" placeholder="Search students…" oninput="search(this.value)"/>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Name</th><th>Department</th><th>Year</th><th>GPA</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const students = [
    { id:"CU-2021-0041", name:"Amelia Hartwell",  dept:"Computer Science",  year:4, gpa:3.92, status:"active"    },
    { id:"CU-2022-0178", name:"Marcus Delgado",    dept:"Business Admin",    year:3, gpa:3.45, status:"active"    },
    { id:"CU-2023-0205", name:"Sophia Chen",       dept:"Biomedical Eng.",   year:2, gpa:3.78, status:"active"    },
    { id:"CU-2024-0390", name:"Elijah Okonkwo",    dept:"Political Science", year:1, gpa:2.91, status:"active"    },
    { id:"CU-2021-0088", name:"Isabella Torres",   dept:"Psychology",        year:4, gpa:3.60, status:"active"    },
    { id:"CU-2022-0334", name:"Noah Fitzgerald",   dept:"Architecture",      year:3, gpa:2.15, status:"probation" },
    { id:"CU-2023-0451", name:"Aisha Rahman",      dept:"Data Science",      year:2, gpa:4.00, status:"active"    },
    { id:"CU-2020-0019", name:"James Whitmore",    dept:"Mechanical Eng.",   year:5, gpa:3.30, status:"active"    },
    { id:"CU-2024-0102", name:"Camille Beaumont",  dept:"Fine Arts",         year:1, gpa:3.10, status:"active"    },
    { id:"CU-2021-0267", name:"Samuel Okafor",     dept:"Law & Society",     year:4, gpa:1.98, status:"inactive"  },
  ];

  function render(list) {
    document.getElementById("tbody").innerHTML = list.map(s => `
      <tr>
        <td style="color:#888;font-size:12px;">${s.id}</td>
        <td><strong>${s.name}</strong></td>
        <td>${s.dept}</td>
        <td>Year ${s.year}</td>
        <td>${s.gpa.toFixed(2)}</td>
        <td><span class="badge ${s.status}">${s.status.charAt(0).toUpperCase()+s.status.slice(1)}</span></td>
      </tr>`).join("");
  }

  function search(q) {
    render(students.filter(s =>
      s.name.toLowerCase().includes(q.toLowerCase()) ||
      s.dept.toLowerCase().includes(q.toLowerCase()) ||
      s.id.includes(q)
    ));
  }

  function openDash(name) {
    document.getElementById("userName").textContent = name;
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    document.body.style.alignItems = "flex-start";
    render(students);
  }

  function login() {
    const email = document.getElementById("email").value.trim();
    const pass  = document.getElementById("pass").value.trim();
    const role  = document.getElementById("role").value;
    if (!email || !pass || !role) return alert("Please fill in all fields.");
    openDash(email.split("@")[0]);
  }

  function demo()   { openDash("Admin Demo"); }

  function logout() {
    document.getElementById("loginCard").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
    document.body.style.alignItems = "center";
    document.getElementById("email").value = "";
    document.getElementById("pass").value  = "";
    document.getElementById("role").value  = "";
  }
</script>
</body>
</html>
